name: Verify mobile and web

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Build web
        run: npm run build:web

  ios-build-placeholder:
    # Enable when you have Apple signing/build config.
    if: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: iOS build placeholder
        run: echo "Add xcodebuild / flutter build ios / fastlane lane here."
